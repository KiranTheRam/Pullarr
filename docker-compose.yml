services:
  pullarr:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: pullarr
    ports:
      - "6997:6997"
    volumes:
      - ./data/pullarr-config:/config
      - ./data/comics:/comics
      # qBittorrent's download dir must be visible at the same path pullarr
      # sees when importing completed torrents (optional feature)
      - ./data/downloads:/downloads
    restart: unless-stopped

  # Optional: VPN-wrapped qBittorrent (binhex) whose Privoxy (port 8118) can
  # also route pullarr's GetComics traffic through the VPN — set
  # Settings → Sources → HTTP proxy to http://<host>:8118.
  # Requires PIA_USER / PIA_PASS in a .env file next to this compose file.
  qbittorrent:
    image: binhex/arch-qbittorrentvpn:latest
    container_name: pullarr-qbittorrent
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - VPN_ENABLED=yes
      - VPN_USER=${PIA_USER}
      - VPN_PASS=${PIA_PASS}
      - VPN_PROV=pia
      - VPN_CLIENT=wireguard
      - USERSPACE_WIREGUARD=yes
      - STRICT_PORT_FORWARD=yes
      - ENABLE_STARTUP_SCRIPTS=no
      - ENABLE_PRIVOXY=yes
      - ENABLE_SOCKS=no
      - LAN_NETWORK=192.168.1.0/24
      - NAME_SERVERS=1.1.1.1,1.0.0.1
      - DEBUG=false
      - WEBUI_PORT=8081
      - UMASK=000
      - PUID=1000
      - PGID=1000
    ports:
      - "8081:8081"
      - "8118:8118"
    volumes:
      - ./data/qbittorrent-config:/config
      - ./data/downloads:/data
      - ./data/downloads:/downloads
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped
